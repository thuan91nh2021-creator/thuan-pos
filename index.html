<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Pro Cloud - Thuận FinTech</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="manHinhXacThuc" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.98); z-index:9999; display:flex; align-items:center; justify-content:center; font-family: sans-serif;">
        <div style="width:350px; padding:40px; border-radius:20px; background: white; text-align:center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid #eee;">
            <h2 id="tieuDeXacThuc" style="color: #2c3e50; margin-bottom: 25px;">Chào mừng Thuận!</h2>
            <input type="email" id="emailUser" placeholder="Email của bạn" style="width:100%; padding:12px; margin-bottom:15px; border-radius:8px; border:1px solid #ddd; box-sizing: border-box; outline: none;">
            <input type="password" id="passUser" placeholder="Mật khẩu (6 ký tự)" style="width:100%; padding:12px; margin-bottom:25px; border-radius:8px; border:1px solid #ddd; box-sizing: border-box; outline: none;">
            <div id="cumNutDangNhap">
                <button onclick="xuLyXacThuc('dang-nhap')" style="width:100%; padding:12px; background:#27ae60; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold; margin-bottom:15px;">ĐĂNG NHẬP</button>
                <p style="font-size:13px; color:#7f8c8d;">Chưa có tài khoản? <a href="#" onclick="chuyenCheDo(false)" style="color:#2980b9; text-decoration:none; font-weight:bold;">Đăng ký ngay</a></p>
            </div>
            <div id="cumNutDangKy" style="display:none;">
                <button onclick="xuLyXacThuc('dang-ky')" style="width:100%; padding:12px; background:#2980b9; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold; margin-bottom:15px;">TẠO TÀI KHOẢN</button>
                <p style="font-size:13px; color:#7f8c8d;">Đã có tài khoản? <a href="#" onclick="chuyenCheDo(true)" style="color:#27ae60; text-decoration:none; font-weight:bold;">Quay lại Đăng nhập</a></p>
            </div>
        </div>
    </div>

    <div class="top-bar">
        <h1>QUẢN LÝ BÁN HÀNG CLOUD</h1>
        <div style="display: flex; align-items: center; gap: 10px;">
            <input type="date" id="workDate" onchange="loadDataByDate()">
            <button onclick="dangXuat()" style="background:#e74c3c; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer; font-weight:bold;">Thoát</button>
        </div>
    </div>

    <div class="stats-container">
        <div class="stat-card income"><span>Doanh thu</span><h2 id="totalIncomeText">0đ</h2></div>
        <div class="stat-card expense"><span>Chi phí</span><h2 id="totalExpenseText">0đ</h2></div>
        <div class="stat-card profit"><span>Lợi nhuận</span><h2 id="totalProfitText">0đ</h2></div>
    </div>

    <div class="quick-action">
        <button onclick="addManualTransaction('expense')" class="btn-exp" style="flex:1">- CHI NGOÀI</button>
        <button onclick="addManualTransaction('income')" class="btn-inc" style="flex:1">+ THU KHÁC</button>
    </div>
    
    <div class="main-container">
        <div class="section">
            <h3>🪑 Bàn</h3>
            <div id="tableGrid" class="table-grid"></div>
        </div>
        <div class="section">
            <h3>🍴 Thực đơn</h3>
            <div id="menuGrid" class="menu-grid"></div>
        </div>
        <div class="section checkout-section">
            <h3 id="selectedTableTitle">Chọn bàn...</h3>
            <div id="currentCart" class="cart-box"><ul id="cartItems"></ul></div>
            <div class="cart-total">Tổng: <span id="cartTotal">0</span>đ</div>
            <div id="qrArea" style="display:none; text-align:center; border: 2px solid #2980b9; padding:10px; border-radius:8px; margin-bottom:10px;">
                <img id="vietQrImg" src="" style="width:160px; height:160px;"><br>
                <button onclick="confirmQR()" style="background:#27ae60; color:white; border:none; padding:8px; width:100%; cursor:pointer;">Xác nhận nhận tiền</button>
            </div>
            <div class="btn-group">
                <button id="btnPayCash" onclick="checkout('Tiền mặt')" class="btn-inc" disabled>Tiền mặt</button>
                <button id="btnPayQR" onclick="showQR()" class="btn-exp" style="background:#2980b9 !important" disabled>VietQR</button>
            </div>
            <div class="report-box"><canvas id="chart"></canvas></div>
        </div>
    </div>

    <div class="history-section">
        <div style="display:flex; justify-content:space-between;">
            <h4>📜 Nhật ký</h4>
            <button onclick="exportToExcel()" class="btn-excel">📥 Excel</button>
        </div>
        <ul id="historyList"></ul>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
